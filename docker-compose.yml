# tonemirror-server docker-compose.yml

services:
  nginx:
    image: nginx
    container_name: nginx-server
    ports:
      - "28282:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - spring
      - fast-api
      - frontend
    restart: unless-stopped

  spring:
    build: ./tonemirror-spring
    container_name: spring-server
    depends_on:
      - mysql
  
  fast-api:
    build: ./tonemirror-python
    container_name: fastapi-server
    depends_on:
      - mysql
  
  frontend:
    build: ./tonemirror-web
    container_name: react-server
  
  mysql:
    image: mysql:8.0
    container_name: mysql-server
    ports:
      - "28336:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: tonemirror
    volumes:
      - ./mysql-data:/var/lib/mysql
    restart: unless-stopped